<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <title>Graph View</title>

  <script src="https://d3js.org/d3.v7.min.js"></script>

  <style>
    body {
      margin: 0;
      display: flex;
      background: #0f1117;
      color: white;
      font-family: sans-serif;
    }

    canvas {
      flex: 1;
    }

    #panel {
      width: 300px;
      background: #1a1d25;
      padding: 16px;
      overflow-y: auto;
    }
  </style>
</head>
<body>

<canvas id="graph"></canvas>

<div id="panel">
  <h2>Node Info</h2>
  <div id="info">Click a node</div>
</div>

<script>

const SHEET_ID = "10Mxi3ZwBz2b7AgF-zDroRZhahTfsGdMDmbOvWXiv2Q8";

const nodesUrl =
  `https://docs.google.com/spreadsheets/d/${SHEET_ID}/gviz/tq?tqx=out:csv&sheet=nodes`;


/* ================================
   edges 생성
================================ */
function buildEdges(nodes) {
  const edges = [];

  nodes.forEach(node => {
    if (!node.links) return;

    node.links.split(",").forEach(t => {
      const target = t.trim();
      if (!target) return;

      edges.push({
        source: node.id,
        target: target
      });
    });
  });

  return edges;
}


/* ================================
   d3.csv 사용 (핵심 해결)
================================ */
d3.csv(nodesUrl).then(nodes => {

  const edges = buildEdges(nodes);

  console.log("nodes:", nodes);
  console.log("edges:", edges);

  initGraph(nodes, edges);

});


function initGraph(nodes, edges) {

  const canvas = document.getElementById("graph");
  const ctx = canvas.getContext("2d");

  canvas.width = window.innerWidth - 300;
  canvas.height = window.innerHeight;

  const simulation = d3.forceSimulation(nodes)
    .force("link", d3.forceLink(edges).id(d => d.id).distance(100))
    .force("charge", d3.forceManyBody().strength(-200))
    .force("center", d3.forceCenter(canvas.width/2, canvas.height/2));

  let selectedNode = null;

  function draw() {
    ctx.clearRect(0,0,canvas.width,canvas.height);

    edges.forEach(e => {
      ctx.beginPath();
      ctx.moveTo(e.source.x, e.source.y);
      ctx.lineTo(e.target.x, e.target.y);
      ctx.strokeStyle = "rgba(200,200,200,0.2)";
      ctx.stroke();
    });

    nodes.forEach(n => {
      ctx.beginPath();
      ctx.arc(n.x, n.y, selectedNode===n?8:5, 0, Math.PI*2);
      ctx.fillStyle = selectedNode===n?"#fff":"#8fa1c7";
      ctx.fill();
    });
  }

  canvas.addEventListener("click", (e) => {
    const rect = canvas.getBoundingClientRect();

    const x = e.clientX - rect.left;
    const y = e.clientY - rect.top;

    selectedNode = nodes.find(n => {
      const dx = n.x - x;
      const dy = n.y - y;
      return Math.sqrt(dx*dx + dy*dy) < 8;
    });

    if (selectedNode) renderPanel(selectedNode, edges);
  });

  function renderPanel(node, edges) {
    const neighbors = edges
      .filter(e => e.source.id === node.id || e.target.id === node.id)
      .map(e => e.source.id === node.id ? e.target : e.source);

    document.getElementById("info").innerHTML = `
      <h3>${node.label}</h3>
      <p>ID: ${node.id}</p>
      <p>Group: ${node.group}</p>
      <p>작성자: ${node["작성자"]}</p>
      <p>진행현황: ${node["진행현황"]}</p>
      <p>${node.description}</p>
      ${node.url ? `<a href="${node.url}" target="_blank">Link</a>` : ""}

      <h4>Connections</h4>
      ${neighbors.map(n=>`<div>${n.label}</div>`).join("")}
    `;
  }

  simulation.on("tick", draw);
}

</script>

</body>
</html>
