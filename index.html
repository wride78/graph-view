<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Work Graph</title>

  <script src="https://cdnjs.cloudflare.com/ajax/libs/pixi.js/7.4.2/pixi.min.js"></script>
  <script src="https://d3js.org/d3.v7.min.js"></script>

  <style>
    :root {
      --bg: #0b1220;
      --bg-soft: #111827;
      --bg-panel: rgba(17, 24, 39, 0.92);
      --bg-card: rgba(30, 41, 59, 0.88);
      --border: rgba(148, 163, 184, 0.16);
      --text: #e5eefc;
      --muted: #94a3b8;
      --accent: #60a5fa;
      --accent-2: #a78bfa;
      --danger: #ef4444;
      --shadow: 0 12px 28px rgba(0, 0, 0, 0.28);
      --radius: 14px;
    }

    * { box-sizing: border-box; }

    html, body {
      margin: 0;
      width: 100%;
      height: 100%;
      overflow: hidden;
      background:
        radial-gradient(circle at top left, rgba(96,165,250,0.08), transparent 25%),
        radial-gradient(circle at top right, rgba(167,139,250,0.06), transparent 20%),
        linear-gradient(180deg, #09111d 0%, #0b1220 100%);
      color: var(--text);
      font-family: Inter, Pretendard, Apple SD Gothic Neo, "Noto Sans KR", Arial, sans-serif;
    }

    body {
      display: flex;
    }

    #graph-wrap {
      position: relative;
      flex: 1;
      overflow: hidden;
      min-width: 0;
    }

    #topbar {
      position: absolute;
      top: 14px;
      left: 14px;
      right: 14px;
      z-index: 20;
      display: grid;
      grid-template-columns: 1fr auto;
      gap: 12px;
      pointer-events: none;
    }

    .panel {
      pointer-events: auto;
      background: var(--bg-panel);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      box-shadow: var(--shadow);
      backdrop-filter: blur(10px);
    }

    #filters {
      padding: 12px;
    }

    #filters h1 {
      margin: 0 0 10px;
      font-size: 18px;
      font-weight: 700;
    }

    .filter-row {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      margin-top: 10px;
      align-items: center;
    }

    .filter-label {
      color: var(--muted);
      font-size: 12px;
      min-width: 58px;
    }

    .chip {
      border: 1px solid var(--border);
      background: rgba(255,255,255,0.03);
      color: var(--text);
      border-radius: 999px;
      padding: 7px 12px;
      font-size: 12px;
      cursor: pointer;
    }

    .chip.active {
      background: rgba(96, 165, 250, 0.18);
      border-color: rgba(96, 165, 250, 0.5);
      color: #dbeafe;
    }

    #top-actions {
      display: flex;
      gap: 10px;
      align-items: flex-start;
    }

    #searchBox,
    #controlBox {
      padding: 10px;
      display: flex;
      gap: 8px;
      align-items: center;
    }

    #searchInput {
      width: 240px;
      height: 38px;
      padding: 0 12px;
      border: 1px solid var(--border);
      outline: none;
      border-radius: 10px;
      background: rgba(255,255,255,0.04);
      color: var(--text);
    }

    .btn {
      min-width: 38px;
      height: 38px;
      border: 1px solid var(--border);
      border-radius: 10px;
      background: rgba(255,255,255,0.04);
      color: var(--text);
      cursor: pointer;
      font-size: 15px;
    }

    .btn.toggle.active {
      background: rgba(96, 165, 250, 0.18);
      border-color: rgba(96,165,250,0.45);
    }

    #statusBox {
      position: absolute;
      left: 14px;
      bottom: 14px;
      z-index: 25;
      max-width: 520px;
      padding: 10px 12px;
      border-radius: 12px;
      background: rgba(15, 23, 42, 0.9);
      border: 1px solid var(--border);
      color: #cbd5e1;
      font-size: 13px;
      white-space: pre-wrap;
      line-height: 1.5;
    }

    #statusBox.error {
      border-color: rgba(239, 68, 68, 0.45);
      color: #fecaca;
    }

    #bottom-summary {
      position: absolute;
      right: 14px;
      bottom: 14px;
      z-index: 20;
      display: flex;
      gap: 12px;
      pointer-events: none;
    }

    .summary-card {
      width: 120px;
      padding: 14px;
      border-radius: var(--radius);
      border: 1px solid var(--border);
      background: var(--bg-card);
      box-shadow: var(--shadow);
      backdrop-filter: blur(10px);
      pointer-events: auto;
    }

    .summary-title {
      color: var(--muted);
      font-size: 12px;
      margin-bottom: 6px;
    }

    .summary-value {
      font-size: 24px;
      font-weight: 800;
    }

    #side-panel {
      width: 360px;
      min-width: 360px;
      max-width: 360px;
      background: linear-gradient(180deg, rgba(15,23,42,0.98), rgba(17,24,39,0.98));
      border-left: 1px solid var(--border);
      padding: 18px 16px;
      overflow-y: auto;
    }

    .info-card {
      border: 1px solid var(--border);
      border-radius: 14px;
      padding: 14px;
      background: rgba(255,255,255,0.03);
      margin-bottom: 12px;
    }

    .info-title {
      margin: 0 0 10px;
      font-size: 19px;
      font-weight: 700;
    }

    .meta {
      margin: 6px 0;
      line-height: 1.5;
      word-break: break-word;
    }

    .description {
      white-space: pre-wrap;
      word-break: break-word;
      line-height: 1.6;
      color: #d5def0;
      margin-top: 10px;
    }

    .section-title {
      margin: 16px 0 8px;
      color: #dbeafe;
      font-size: 13px;
      font-weight: 700;
      text-transform: uppercase;
    }

    .related-list {
      display: flex;
      flex-direction: column;
      gap: 8px;
    }

    .related-item {
      padding: 10px 12px;
      border-radius: 10px;
      background: rgba(255,255,255,0.04);
      cursor: pointer;
    }

    .related-item small {
      display: block;
      color: var(--muted);
      margin-top: 4px;
    }

    .empty {
      color: var(--muted);
      line-height: 1.7;
    }

    a {
      color: #93c5fd;
      text-decoration: none;
    }
  </style>
</head>
<body>
  <div id="graph-wrap">
    <div id="topbar">
      <div id="filters" class="panel">
        <h1>업무 네트워크 그래프</h1>

        <div class="filter-row">
          <div class="filter-label">담당팀</div>
          <div id="groupFilters"></div>
        </div>

        <div class="filter-row">
          <div class="filter-label">진행상태</div>
          <div id="statusFilters"></div>
        </div>
      </div>

      <div id="top-actions">
        <div id="searchBox" class="panel">
          <input id="searchInput" type="text" placeholder="노드 검색" />
          <button id="localBtn" class="btn toggle" type="button">Local</button>
        </div>

        <div id="controlBox" class="panel">
          <button id="zoomOutBtn" class="btn" type="button">−</button>
          <button id="zoomInBtn" class="btn" type="button">+</button>
          <button id="resetBtn" class="btn" type="button">↺</button>
        </div>
      </div>
    </div>

    <div id="statusBox">초기화 중...</div>

    <div id="bottom-summary">
      <div class="summary-card">
        <div class="summary-title">전체 노드</div>
        <div class="summary-value" id="totalCount">0</div>
      </div>
      <div class="summary-card">
        <div class="summary-title">진행중</div>
        <div class="summary-value" id="inProgressCount">0</div>
      </div>
      <div class="summary-card">
        <div class="summary-title">완료</div>
        <div class="summary-value" id="doneCount">0</div>
      </div>
      <div class="summary-card">
        <div class="summary-title">계획</div>
        <div class="summary-value" id="plannedCount">0</div>
      </div>
    </div>
  </div>

  <aside id="side-panel">
    <h2>노드 정보</h2>
    <div id="info" class="empty">그래프에서 노드를 선택하면 상세 정보와 관련 links 노드가 표시됩니다.</div>
  </aside>

  <script>
    const SHEET_ID = atob("MTBNeGkzWndCejJiN0FnRi16RHJvUlpocWhUZnNHZE1EbWJPdldYaXYyUTg=");
    const NODES_URL = `https://docs.google.com/spreadsheets/d/${SHEET_ID}/gviz/tq?tqx=out:csv&sheet=nodes`;

    let allNodes = [];
    let allEdges = [];
    let adjacency = new Map();

    let selectedNode = null;
    let localMode = false;
    let localDepth = 1;
    let currentScale = 1;
    let activeGroup = "전체";
    let activeStatus = "전체";

    let app, container, edgeLayer, nodeLayer, labelLayer, simulation;
    let nodeSprites = [];
    let isPanning = false;
    let panStart = { x: 0, y: 0 };

    function setStatus(message, isError = false) {
      const box = document.getElementById("statusBox");
      box.textContent = message;
      box.classList.toggle("error", isError);
    }

    function parseCSV(text) {
      text = text.replace(/^\uFEFF/, "");
      const rows = [];
      let row = [];
      let field = "";
      let inQuotes = false;

      for (let i = 0; i < text.length; i++) {
        const ch = text[i];
        const next = text[i + 1];

        if (ch === '"') {
          if (inQuotes && next === '"') {
            field += '"';
            i++;
          } else {
            inQuotes = !inQuotes;
          }
        } else if (ch === ',' && !inQuotes) {
          row.push(field);
          field = "";
        } else if ((ch === '\n' || ch === '\r') && !inQuotes) {
          if (ch === '\r' && next === '\n') i++;
          row.push(field);
          if (row.some(v => v !== "")) rows.push(row);
          row = [];
          field = "";
        } else {
          field += ch;
        }
      }

      row.push(field);
      if (row.some(v => v !== "")) rows.push(row);
      if (!rows.length) return [];

      const headers = (rows[0] || []).map(v => String(v).trim());

      return rows.slice(1).map(cols => {
        const obj = {};
        headers.forEach((h, idx) => {
          obj[h] = (cols[idx] ?? "").trim();
        });
        return obj;
      });
    }

    function buildEdges(nodes) {
      const map = new Map(nodes.map(n => [n.id, n]));
      const edges = [];

      nodes.forEach(n => {
        if (!n.links) return;
        String(n.links)
          .split(",")
          .map(v => v.trim())
          .filter(Boolean)
          .forEach(target => {
            if (map.has(target)) edges.push({ source: n.id, target });
          });
      });

      return edges;
    }

    function buildAdjacency(edges) {
      const map = new Map();
      edges.forEach(e => {
        if (!map.has(e.source)) map.set(e.source, new Set());
        if (!map.has(e.target)) map.set(e.target, new Set());
        map.get(e.source).add(e.target);
        map.get(e.target).add(e.source);
      });
      return map;
    }

    function getNodeById(id) {
      return allNodes.find(n => n.id === id) || null;
    }

    function getNeighbors(id) {
      return Array.from(adjacency.get(id) || []).map(getNodeById).filter(Boolean);
    }

    function isMainNode(node) {
      return String(node.group || "").toLowerCase().includes("main") || String(node.id || "").toLowerCase() === "main";
    }

    function getFilteredNodes() {
      return allNodes.filter(n => {
        const groupPass = activeGroup === "전체" || (n.group || "미분류") === activeGroup;
        const statusPass = activeStatus === "전체" || (n["진행현황"] || "미정") === activeStatus;
        return groupPass && statusPass;
      });
    }

    function getLocalIds(centerId, edges, depth = 1) {
      const visited = new Set([centerId]);
      const queue = [{ id: centerId, level: 0 }];

      while (queue.length) {
        const { id, level } = queue.shift();
        if (level >= depth) continue;

        edges.forEach(e => {
          const next = e.source === id ? e.target : e.target === id ? e.source : null;
          if (next && !visited.has(next)) {
            visited.add(next);
            queue.push({ id: next, level: level + 1 });
          }
        });
      }
      return visited;
    }

    function getFilteredGraph() {
      const filteredNodes = getFilteredNodes();
      const ids = new Set(filteredNodes.map(n => n.id));
      let filteredEdges = allEdges.filter(e => ids.has(e.source) && ids.has(e.target));

      if (localMode && selectedNode && ids.has(selectedNode.id)) {
        const localIds = getLocalIds(selectedNode.id, filteredEdges, localDepth);
        return {
          ids: localIds,
          edges: filteredEdges.filter(e => localIds.has(e.source) && localIds.has(e.target))
        };
      }

      return { ids, edges: filteredEdges };
    }

    function setupPixi() {
      const wrap = document.getElementById("graph-wrap");

      app = new PIXI.Application({
        width: wrap.clientWidth,
        height: wrap.clientHeight,
        backgroundAlpha: 0,
        antialias: true,
        resolution: window.devicePixelRatio || 1,
        autoDensity: true
      });

      wrap.appendChild(app.view);
      app.view.style.position = "absolute";
      app.view.style.left = "0";
      app.view.style.top = "0";
      app.view.style.width = "100%";
      app.view.style.height = "100%";

      container = new PIXI.Container();
      edgeLayer = new PIXI.Graphics();
      labelLayer = new PIXI.Container();
      nodeLayer = new PIXI.Container();

      container.addChild(edgeLayer);
      container.addChild(labelLayer);
      container.addChild(nodeLayer);
      app.stage.addChild(container);

      app.view.addEventListener("wheel", onWheel, { passive: false });
      app.view.addEventListener("mousedown", onPanStart);
      window.addEventListener("mousemove", onPanMove);
      window.addEventListener("mouseup", onPanEnd);
      window.addEventListener("resize", () => {
        const wrap = document.getElementById("graph-wrap");
        app.renderer.resize(wrap.clientWidth, wrap.clientHeight);
      });

      app.ticker.add(renderScene);
    }

    function createSimulation() {
      if (simulation) simulation.stop();

      simulation = d3.forceSimulation(allNodes)
        .alpha(0.9)
        .alphaDecay(0.025)
        .velocityDecay(0.36)
        .force("link", d3.forceLink(allEdges).id(d => d.id).distance(110).strength(0.14))
        .force("charge", d3.forceManyBody().strength(-260))
        .force("center", d3.forceCenter(420, window.innerHeight * 0.5))
        .force("collision", d3.forceCollide().radius(d => isMainNode(d) ? 18 : 11));

      simulation.on("tick", () => {
        if (simulation.alpha() < 0.02) simulation.alpha(0.024);
      });
    }

    function createSprites() {
      nodeLayer.removeChildren();
      labelLayer.removeChildren();
      nodeSprites = [];

      allNodes.forEach(node => {
        const g = new PIXI.Graphics();
        g.eventMode = "static";
        g.cursor = "pointer";
        g.on("pointerdown", (event) => {
          event.stopPropagation();
          selectNode(node.id, true);
        });

        const label = new PIXI.Text(node.label || node.id, {
          fill: 0xdbeafe,
          fontSize: 12,
          fontFamily: "Arial"
        });
        label.anchor.set(0.5, 1.8);
        label.visible = false;

        nodeLayer.addChild(g);
        labelLayer.addChild(label);
        nodeSprites.push({ node, g, label });
      });
    }

    function renderScene() {
      if (!edgeLayer) return;

      const graph = getFilteredGraph();
      const visibleIds = graph.ids;
      const visibleEdges = graph.edges;
      const neighbors = selectedNode ? new Set(getNeighbors(selectedNode.id).map(n => n.id)) : new Set();

      edgeLayer.clear();

      visibleEdges.forEach(e => {
        const s = getNodeById(e.source);
        const t = getNodeById(e.target);
        if (!s || !t) return;

        const strong = selectedNode && (e.source === selectedNode.id || e.target === selectedNode.id);
        edgeLayer.lineStyle(strong ? 2 : 1, strong ? 0x93c5fd : 0xcbd5e1, strong ? 0.62 : 0.16);
        edgeLayer.moveTo(s.x, s.y);
        edgeLayer.lineTo(t.x, t.y);
      });

      nodeSprites.forEach(item => {
        const n = item.node;
        const visible = visibleIds.has(n.id);
        item.g.visible = visible;
        item.label.visible = false;
        if (!visible) return;

        const selected = selectedNode && selectedNode.id === n.id;
        const neighbor = selectedNode && neighbors.has(n.id);
        const main = isMainNode(n);

        let radius = main ? 9 : 5;
        let color = main ? 0xfbbf24 : 0x7dd3fc;
        let alpha = 0.92;

        if (selected) {
          radius = 14;
          color = 0xffffff;
          alpha = 1;
        } else if (neighbor) {
          radius = Math.max(radius, 8);
          color = 0xa78bfa;
          alpha = 1;
        } else if (selectedNode) {
          alpha = 0.18;
          color = main ? 0xfbbf24 : 0x64748b;
        }

        item.g.clear();
        item.g.beginFill(color, alpha);
        item.g.drawCircle(0, 0, radius);
        item.g.endFill();
        item.g.x = n.x;
        item.g.y = n.y;
        item.label.x = n.x;
        item.label.y = n.y;

        if (selected || neighbor || (!selectedNode && currentScale > 1.25)) {
          item.label.visible = true;
        }
      });
    }

    function updateSummary() {
      const nodes = getFilteredNodes();
      document.getElementById("totalCount").textContent = nodes.length;
      document.getElementById("inProgressCount").textContent = nodes.filter(n => (n["진행현황"] || "").includes("진행")).length;
      document.getElementById("doneCount").textContent = nodes.filter(n => (n["진행현황"] || "").includes("완료")).length;
      document.getElementById("plannedCount").textContent = nodes.filter(n => (n["진행현황"] || "").includes("계획")).length;
    }

    function renderFilters() {
      const groups = ["전체", ...new Set(allNodes.map(n => n.group || "미분류"))];
      const statuses = ["전체", ...new Set(allNodes.map(n => n["진행현황"] || "미정"))];

      document.getElementById("groupFilters").innerHTML = groups.map(v =>
        `<button class="chip ${v === activeGroup ? "active" : ""}" data-type="group" data-value="${escapeAttr(v)}">${escapeHtml(v)}</button>`
      ).join("");

      document.getElementById("statusFilters").innerHTML = statuses.map(v =>
        `<button class="chip ${v === activeStatus ? "active" : ""}" data-type="status" data-value="${escapeAttr(v)}">${escapeHtml(v)}</button>`
      ).join("");

      document.querySelectorAll(".chip").forEach(el => {
        el.addEventListener("click", () => {
          const type = el.getAttribute("data-type");
          const value = el.getAttribute("data-value");
          if (type === "group") activeGroup = value;
          if (type === "status") activeStatus = value;
          renderFilters();
          updateSummary();
          updateInfoPanel();
        });
      });
    }

    function updateInfoPanel() {
      const info = document.getElementById("info");

      if (!selectedNode) {
        info.innerHTML = `<div class="empty">그래프에서 노드를 선택하면 상세 정보와 관련 links 노드가 표시됩니다.</div>`;
        return;
      }

      const node = getNodeById(selectedNode.id);
      const neighbors = getNeighbors(node.id);

      info.innerHTML = `
        <div class="info-card">
          <div class="info-title">${escapeHtml(node.label || node.id)}</div>
          <div class="meta"><b>ID:</b> ${escapeHtml(node.id || "-")}</div>
          <div class="meta"><b>Group:</b> ${escapeHtml(node.group || "-")}</div>
          <div class="meta"><b>작성자:</b> ${escapeHtml(node["작성자"] || "-")}</div>
          <div class="meta"><b>진행현황:</b> ${escapeHtml(node["진행현황"] || "-")}</div>
          ${node.url ? `<div class="meta"><a href="${escapeAttr(node.url)}" target="_blank" rel="noopener noreferrer">관련 링크 열기</a></div>` : ""}
          <div class="description">${escapeHtml(node.description || "")}</div>
        </div>

        <div class="section-title">Related Links Nodes</div>
        <div class="related-list">
          ${
            neighbors.length
              ? neighbors.map(n => `
                <div class="related-item" data-node-id="${escapeAttr(n.id)}">
                  ${escapeHtml(n.label || n.id)}
                  <small>${escapeHtml(n.group || "-")} · ${escapeHtml(n["진행현황"] || "-")}</small>
                </div>
              `).join("")
              : `<div class="empty">연결된 노드가 없습니다.</div>`
          }
        </div>
      `;

      info.querySelectorAll(".related-item").forEach(el => {
        el.addEventListener("click", () => {
          const id = el.getAttribute("data-node-id");
          if (id) selectNode(id, true);
        });
      });
    }

    function selectNode(id, focus = false) {
      const node = getNodeById(id);
      if (!node) return;
      selectedNode = node;
      updateInfoPanel();
      if (focus) focusOnNode(node);
    }

    function focusOnNode(node) {
      const wrap = document.getElementById("graph-wrap");
      container.x = wrap.clientWidth * 0.5 - node.x * currentScale;
      container.y = wrap.clientHeight * 0.5 - node.y * currentScale;
    }

    function applyZoom(factor, pivotX, pivotY) {
      const nextScale = Math.max(0.35, Math.min(3.5, currentScale * factor));
      const actual = nextScale / currentScale;
      if (actual === 1) return;

      container.x = pivotX - (pivotX - container.x) * actual;
      container.y = pivotY - (pivotY - container.y) * actual;
      currentScale = nextScale;
      container.scale.set(currentScale);
    }

    function onWheel(e) {
      e.preventDefault();
      const rect = app.view.getBoundingClientRect();
      applyZoom(e.deltaY > 0 ? 0.9 : 1.1, e.clientX - rect.left, e.clientY - rect.top);
    }

    function onPanStart(e) {
      if (e.target !== app.view) return;
      isPanning = true;
      panStart = { x: e.clientX, y: e.clientY };
    }

    function onPanMove(e) {
      if (!isPanning) return;
      container.x += e.clientX - panStart.x;
      container.y += e.clientY - panStart.y;
      panStart = { x: e.clientX, y: e.clientY };
    }

    function onPanEnd() {
      isPanning = false;
    }

    function resetView() {
      currentScale = 1;
      container.scale.set(1);
      const wrap = document.getElementById("graph-wrap");
      container.x = wrap.clientWidth * 0.08;
      container.y = wrap.clientHeight * 0.08;
      if (selectedNode) focusOnNode(selectedNode);
    }

    function bindUi() {
      document.getElementById("zoomInBtn").addEventListener("click", () => {
        const wrap = document.getElementById("graph-wrap");
        applyZoom(1.15, wrap.clientWidth / 2, wrap.clientHeight / 2);
      });

      document.getElementById("zoomOutBtn").addEventListener("click", () => {
        const wrap = document.getElementById("graph-wrap");
        applyZoom(0.87, wrap.clientWidth / 2, wrap.clientHeight / 2);
      });

      document.getElementById("resetBtn").addEventListener("click", resetView);

      document.getElementById("searchInput").addEventListener("input", (e) => {
        const q = String(e.target.value || "").trim().toLowerCase();
        if (!q) return;
        const found = allNodes.find(n =>
          String(n.label || "").toLowerCase().includes(q) ||
          String(n.id || "").toLowerCase().includes(q) ||
          String(n.description || "").toLowerCase().includes(q)
        );
        if (found) selectNode(found.id, true);
      });

      document.getElementById("localBtn").addEventListener("click", () => {
        localMode = !localMode;
        document.getElementById("localBtn").classList.toggle("active", localMode);
      });
    }

    function escapeHtml(value) {
      return String(value)
        .replaceAll("&", "&amp;")
        .replaceAll("<", "&lt;")
        .replaceAll(">", "&gt;")
        .replaceAll('"', "&quot;")
        .replaceAll("'", "&#39;");
    }

    function escapeAttr(value) {
      return escapeHtml(value);
    }

    async function init() {
      setStatus("CSV 데이터를 불러오는 중...");
      setupPixi();
      bindUi();

      const res = await fetch(NODES_URL);
      if (!res.ok) {
        throw new Error(`CSV 요청 실패: HTTP ${res.status}`);
      }

      const csv = await res.text();
      allNodes = parseCSV(csv);
      if (!allNodes.length) {
        throw new Error("nodes 시트가 비어 있거나 CSV 파싱에 실패했습니다.");
      }

      setStatus(`노드 ${allNodes.length}개 로드 완료. edges 생성 중...`);

      allEdges = buildEdges(allNodes);
      adjacency = buildAdjacency(allEdges);

      createSprites();
      createSimulation();
      renderFilters();
      updateSummary();

      const mainNode = allNodes.find(isMainNode) || allNodes[0];
      if (mainNode) {
        selectNode(mainNode.id, false);
      }

      resetView();
      setStatus(`정상 로드 완료: nodes ${allNodes.length}, edges ${allEdges.length}`);
    }

    init().catch(err => {
      console.error(err);
      setStatus(`그래프 로드 실패\n${err.message}`, true);
      document.getElementById("info").innerHTML = `<div class="empty">데이터를 불러오지 못했습니다.</div>`;
    });
  </script>
</body>
</html>
